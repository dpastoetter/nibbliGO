name: Release debug APK

on:
  push:
    tags:
      - "v*"
      - "debug-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Prepare release asset
        run: cp app/build/outputs/apk/debug/app-debug.apk nibbliGO-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nibbliGO-debug.apk
          generate_release_notes: true
          body: |
            Debug APK for sideloading on a physical device.

            **Install:** Download `nibbliGO-debug.apk`, allow installs from your browser or file manager, then open the APK.

            **Note:** Pixel Friend Talk needs a downloaded LiteRT model first (Manage → Models → Qwen 2.5 1.5B Instruct, ~1.6 GB, no sign-in).
